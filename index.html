<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DesignbyJosefine</title>
  <meta name="description" content="Portfolio — branding, typografi og illustrasjon." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/hvitlogo.png">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      height: 100%; overflow: hidden;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: #000;
    }

    /* ── Full-screen stage ── */
    .landing {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* Edge fades */
    .landing::before,
    .landing::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 12vw;
      max-width: 140px;
      z-index: 5;
      pointer-events: none;
    }
    .landing::before {
      left: 0;
      background: linear-gradient(to right, #000, transparent);
    }
    .landing::after {
      right: 0;
      background: linear-gradient(to left, #000, transparent);
    }

    /* ── Collage fills the whole page ── */
    .collage-scene {
      position: absolute;
      inset: 0;
    }

    /* Cards rendered by collage.js */
    .collage-card {
      position: absolute;
      cursor: pointer;
      border-radius: 0;
      overflow: hidden;
      box-shadow:
        0 2px  6px  rgba(0,0,0,.07),
        0 8px  28px rgba(0,0,0,.11),
        0 22px 52px rgba(0,0,0,.08);
      will-change: transform, opacity;
      transition: box-shadow .3s ease;
    }
    .collage-card:hover {
      box-shadow:
        0 4px  10px rgba(0,0,0,.10),
        0 18px 44px rgba(0,0,0,.17),
        0 36px 76px rgba(0,0,0,.13);
    }
    .collage-card img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      pointer-events: none; user-select: none;
      -webkit-user-drag: none;
      filter: brightness(.96) saturate(1.04);
      transition: filter .3s ease;
    }
    .collage-card:hover img {
      filter: brightness(1) saturate(1.08);
    }

    /* ── Top-left block ── */
    .landing__topleft {
      position: absolute;
      top: 36px;
      left: 44px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* ── "Portfolio" — top-left, big, links to the portfolio ── */
    .landing__portfolio-link {
      z-index: 50;
      font-family: "Poppins", sans-serif;
      font-size: clamp(52px, 7vw, 96px);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1;
      color: #fff;
      text-decoration: none;
    }
    .landing__portfolio-link:hover { opacity: .7; }
    .landing__portfolio-link:hover .landing__name { opacity: .7; }

    .landing__name {
      display: block;
      font-family: "Poppins", sans-serif;
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 600;
      letter-spacing: 0.01em;
      color: #fff;
      margin-top: 6px;
    }

    /* ── CTA + bio — bottom-left ── */
    .landing__brand {
      position: absolute;
      bottom: 36px;
      left: 44px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
      pointer-events: none;
    }
    @media (max-width: 820px) {
      .landing__brand { left: 28px; bottom: 28px; }
    }
    @media (max-width: 600px) {
      .landing__brand { left: 20px; bottom: 20px; right: 20px; }
      .landing__cta { padding: 8px 18px; font-size: 11px; }
    }

    .landing__logo {
      width: clamp(130px, 14vw, 190px);
      height: auto;
      display: block;
    }

    .landing__cta {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 0;
      background: #e11584;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-decoration: none;
      pointer-events: all;
      box-shadow: 0 4px 18px rgba(0,0,0,.18);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .landing__cta:hover {
      background: #c40e72;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,.24);
    }
    .landing__cta:active { transform: translateY(0); }
    .landing__cta-arrow {
      flex-shrink: 0;
      transition: transform .18s ease;
    }
    .landing__cta:hover .landing__cta-arrow { transform: translateX(3px); }

    /* ── Bio — inside bottom-left brand block ── */
    .landing__bio {
      max-width: 340px;
      font-size: clamp(13px, 1vw, 15px);
      font-weight: 300;
      line-height: 1.85;
      letter-spacing: 0.015em;
      color: rgba(255,255,255,0.78);
      text-align: justify;
      hyphens: auto;
      hyphenate-limit-chars: 8 4 3;
      -webkit-hyphenate-limit-before: 4;
      -webkit-hyphenate-limit-after: 3;
      overflow-wrap: break-word;
    }
    @media (max-width: 820px) {
      .landing__topleft { top: 28px; left: 28px; }
    }
    @media (max-width: 600px) {
      .landing__topleft { top: 20px; left: 20px; }
      .landing__bio { max-width: none; }
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .collage-scene { transform: scale(.88); transform-origin: center; }
    }
    @media (max-width: 820px) {
      .collage-scene { transform: scale(.72); transform-origin: center; }
      .landing__portfolio-link { font-size: 68px; }
    }
    @media (max-width: 600px) {
      .collage-scene  { transform: scale(.75); transform-origin: center; }
      .landing__portfolio-link { font-size: 58px; }
    }
    @media (max-width: 400px) {
      .collage-scene { transform: scale(.62); transform-origin: center; }
    }
  </style>
</head>

<body>
  <main class="landing">

    <!-- Cards injected here by collage.js -->
    <div class="collage-scene" id="collage-scene" aria-hidden="true"></div>

    <!-- Top-left block -->
    <div class="landing__topleft">
      <a class="landing__portfolio-link" href="./projects.html">PORTFOLIO<span class="landing__name">JOSEFINE REICHELT GJERTSEN</span></a>
    </div>

    <!-- Bottom-left: button + bio -->
    <div class="landing__brand">
      <a class="landing__cta" href="./projects.html">
        Se prosjektene mine
        <svg class="landing__cta-arrow" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
          <path d="M1 6.5h11M7 1l5.5 5.5L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <p class="landing__bio">Hei! Jeg er en grafisk designer født i 2002 med fokus på strategisk design og visuell kommunikasjon. Jeg har også erfaring med wayfinding-systemer, informasjonsarkitektur og UI/UX-design. Jeg trives spesielt godt med å jobbe tverrfaglig.</p>
    </div>

  </main>

  <script src="./collage.js"></script>
</body>
</html>
